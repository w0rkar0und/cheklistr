name: Purge E2E Test Data

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "purge" to confirm deletion of all E2E test data'
        required: true
        type: string

jobs:
  purge:
    name: Purge test data
    runs-on: ubuntu-latest
    if: inputs.confirm == 'purge'
    defaults:
      run:
        working-directory: supabase/scripts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install script dependencies
        run: npm install dotenv tsx

      - name: Purge database records
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx purge-e2e-data.ts

      - name: Purge storage files
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx purge-storage.ts
