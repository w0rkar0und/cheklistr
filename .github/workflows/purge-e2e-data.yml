name: Purge E2E Test Data

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "purge" to confirm deletion of all E2E test data'
        required: true
        type: string

jobs:
  purge:
    name: Purge test data
    runs-on: ubuntu-latest
    if: inputs.confirm == 'purge'
    defaults:
      run:
        working-directory: supabase/scripts
    steps:
      - name: Validate confirmation
        if: inputs.confirm != 'purge'
        run: |
          echo "Confirmation required. Type 'purge' to proceed."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install script dependencies
        run: npm install dotenv tsx

      - name: Run SQL cleanup via Supabase Management API
        env:
          SUPABASE_PROJECT_REF: trlrwnoapvcpszjbntso
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "Running purge-e2e-data.sql against production database…"

          # Use psql via Supabase pooler connection
          PGPASSWORD="${SUPABASE_DB_PASSWORD}" psql \
            "postgresql://postgres.${SUPABASE_PROJECT_REF}:${SUPABASE_DB_PASSWORD}@aws-0-eu-west-2.pooler.supabase.com:6543/postgres" \
            -f purge-e2e-data.sql

      - name: Purge storage files
        env:
          SUPABASE_URL: ${{ secrets.E2E_BASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx purge-storage.ts

      - name: Summary
        run: echo "E2E test data purged successfully. Greythorn org + 3 core users preserved."
