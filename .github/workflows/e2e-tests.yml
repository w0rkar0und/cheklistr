name: E2E Tests

# ─── When to run ───────────────────────────────────────────────
on:
  # On push to main — only when app source code changes
  push:
    branches: [main]
    paths:
      - 'app/src/**'
      - 'app/public/**'
      - 'app/index.html'
      - 'app/vite.config.*'
      - 'app/package.json'
      - 'app/vercel.json'

  # On PRs targeting main — only when app source code changes
  pull_request:
    branches: [main]
    paths:
      - 'app/src/**'
      - 'app/public/**'
      - 'app/index.html'
      - 'app/vite.config.*'
      - 'app/package.json'
      - 'app/vercel.json'

  # Manual trigger — pick a suite or run all
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suites to run: "all" or comma-separated (smoke,checklist,vrm,pdf,admin,api,multi-tenancy,super-admin)'
        required: true
        default: 'all'
        type: string
      skip_vercel_wait:
        description: 'Skip the 60-second Vercel build wait (use when deployment is already live)'
        required: false
        default: false
        type: boolean
      retries:
        description: 'Number of test retries (0 = no retries)'
        required: false
        default: '1'
        type: choice
        options:
          - '0'
          - '1'
          - '2'

# ─── Suite → file mapping ──────────────────────────────────────
# smoke:           login, home, navigation
# checklist:       checklist, draft, submission
# vrm:             vrm-lookup
# pdf:             pdf-aspect-ratio
# admin:           admin, admin-checklists
# api:             api-auth, api-data, api-rls
# multi-tenancy:   multi-tenancy
# super-admin:     super-admin

# ─── Jobs ──────────────────────────────────────────────────────
jobs:
  # ── Shared setup: install deps, save to cache ────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: testing/e2e
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: testing/e2e/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Wait for Vercel build
        if: |
          (github.event_name == 'push' || github.event_name == 'pull_request')
          || (github.event_name == 'workflow_dispatch' && inputs.skip_vercel_wait != true)
        run: |
          echo "Waiting 60 seconds for Vercel deployment to complete…"
          sleep 60

      - name: Create .env file
        run: |
          cat > .env << ENVEOF
          BASE_URL=${{ secrets.E2E_BASE_URL }}
          TEST_ORG_SLUG=greythorn
          TEST_USER_ID=${{ secrets.E2E_TEST_USER_ID }}
          TEST_USER_PASSWORD=${{ secrets.E2E_TEST_USER_PASSWORD }}
          ADMIN_USER_ID=${{ secrets.E2E_ADMIN_USER_ID }}
          ADMIN_USER_PASSWORD=${{ secrets.E2E_ADMIN_USER_PASSWORD }}
          SUPER_ADMIN_USER_ID=${{ secrets.E2E_SUPER_ADMIN_USER_ID }}
          SUPER_ADMIN_USER_PASSWORD=${{ secrets.E2E_SUPER_ADMIN_USER_PASSWORD }}
          E2E_RETRIES=${{ github.event_name == 'workflow_dispatch' && inputs.retries || '1' }}
          ENVEOF

      # Cache the entire working directory so suite jobs skip install
      - name: Cache workspace
        uses: actions/cache/save@v4
        with:
          path: |
            testing/e2e/node_modules
            testing/e2e/.env
            ~/.cache/ms-playwright
          key: e2e-${{ github.run_id }}

  # ── Smoke: login, home, navigation ───────────────────────────
  smoke:
    name: 'Suite: Smoke'
    needs: setup
    if: >-
      github.event_name != 'workflow_dispatch'
      || contains(inputs.suite, 'all')
      || contains(inputs.suite, 'smoke')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: testing/e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore workspace
        uses: actions/cache/restore@v4
        with:
          path: |
            testing/e2e/node_modules
            testing/e2e/.env
            ~/.cache/ms-playwright
          key: e2e-${{ github.run_id }}

      - name: Run smoke tests
        run: npx playwright test login.spec.ts home.spec.ts navigation.spec.ts --project=chromium --project=mobile-chrome

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-smoke-${{ github.run_number }}
          path: testing/e2e/playwright-report/
          retention-days: 14

      - name: Upload failure artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: results-smoke-${{ github.run_number }}
          path: testing/e2e/test-results/
          retention-days: 7

  # ── Checklist: checklist, draft, submission ───────────────────
  checklist:
